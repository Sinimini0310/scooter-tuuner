name: Deploy to bilen.me

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create remote directory via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          script: mkdir -p ~/domains/bilen.me/public_html/scooter-tuuner

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          source: "index.html,style.css,app.js,ble.js,crypto.js,pairing.js,protocol.js,registers.js"
          target: "/home/${{ secrets.FTP_USERNAME }}/domains/bilen.me/public_html/scooter-tuuner/"
          strip_components: 0
